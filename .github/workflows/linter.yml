name: Lint Codebase

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Lint Codebase
        id: super-linter
        uses: super-linter/super-linter/slim@v8
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true

          # Exclude generated dist/ bundle from all linters
          FILTER_REGEX_EXCLUDE: dist/.*

          # Biome conflicts with Prettier; use Prettier only
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false

          # Disable duplicate-code check (license texts in dist/licenses.txt are expected duplicates)
          VALIDATE_JSCPD: false

          # Disable security scanner for workflow files (action pinning is tracked via Dependabot)
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false

          # Use Prettier/TypeScript-ESLint only; disable Standard style linters
          VALIDATE_JAVASCRIPT_STANDARD: false
          VALIDATE_TYPESCRIPT_STANDARD: false

          # n/no-missing-import fires in super-linter's ESLint v9 flat-config context
          # because it cannot resolve .ts extensions. TypeScript is linted locally
          # via 'npm run lint' in the CI workflow.
          VALIDATE_TYPESCRIPT_ES: false
